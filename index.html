<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Le Bon Plan du Valinco</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>

<style>
body { margin:0; padding:0; font-family: sans-serif; }
#map { position:absolute; top:0; bottom:0; width:100%; }

/* boutons filtres */
#filters {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 10;
}

.filter-btn {
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  background: #eee;
  cursor: pointer;
  font-size: 16px;
  width: 150px;
  text-align: left;
}

.filter-btn.active {
  background: #007AFF;
  color: white;
}

/* panneau bas */
#panel {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-height: 60%;
  background: white;
  transform: translateY(100%);
  transition: 0.3s;
  border-radius: 20px 20px 0 0;
  overflow-y: auto;
  z-index: 9;
  padding: 10px;
}

#panel.open {
  transform: translateY(0);
}

/* carousel PC */
#carousel {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  margin-bottom: 10px;
}

#carousel img, #carousel video {
  height: 150px;
  border-radius: 10px;
  flex-shrink: 0;
  cursor: pointer;
}

/* texte PC */
.panel-text p { margin: 5px 0; }
.panel-text .bold { font-weight: bold; }
.panel-text .color { color: #007AFF; }
.panel-text .link { color: #FF5500; text-decoration: underline; cursor: pointer; }
.panel-text .smiley { font-size: 18px; }

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  #filters {
    left: 10px;
    top: 10px;
    gap: 8px;
  }

  .filter-btn {
    width: 100%;
    font-size: 18px;
    padding: 12px 10px;
  }

  #panel {
    padding: 0;
  }

  /* image mobile full écran */
  #carousel {
    display: block;
    overflow: hidden;
    margin: 0;
  }

  #carousel img,
  #carousel video {
    width: 100vw;
    max-width: 100vw;
    margin-left: calc(-50vw + 50%);
    aspect-ratio: 4/3;
    height: auto;
    border-radius: 0;
    object-fit: cover;
    display: none;
  }

  #carousel img.active,
  #carousel video.active {
    display: block;
  }

  /* titre sous image */
  #title {
    padding: 10px 15px 0 15px;
    margin: 0;
  }

  /* texte sous image */
  #desc {
    padding: 10px 15px;
  }
}
</style>
</head>

<body>

<div id="map"></div>

<div id="filters">
  <button class="filter-btn active">🏖️ Plages</button>
  <button class="filter-btn">🍽️ Restaurants</button>
  <button class="filter-btn">🚤 Activités</button>
</div>

<div id="panel">
  <div id="carousel"></div>
  <h2 id="title">Titre</h2>
  <div class="panel-text" id="desc"></div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoia3JlYXJ0IiwiYSI6ImNtbnAyYjVrNjIzZTYyb3M5N3RhaDBybjAifQ.n4cePvCH1ydL1_RTyvrLkg';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v12',
  center: [8.88, 41.68],
  zoom: 11
});

const panel = document.getElementById('panel');
const carousel = document.getElementById('carousel');
const desc = document.getElementById('desc');
const title = document.getElementById('title');

const lieux = [
  {
    type: "plage",
    name: "Plage de Roccapina",
    coords: [8.9, 41.5],
    medias: [
      "https://picsum.photos/600/300?1",
      "https://picsum.photos/600/300?11"
    ],
    desc: [
      {text:"Plage sauvage magnifique", class:"bold"},
      {text:"Eau turquoise 💦", class:"color"},
      {text:"Super endroit 😎", class:"smiley"}
    ]
  }
];

let markers = [];

lieux.forEach(lieu=>{
  const marker = new mapboxgl.Marker().setLngLat(lieu.coords).addTo(map);
  marker.type = lieu.type;

  marker.getElement().addEventListener('click', e=>{
    e.stopPropagation();

    // 🔥 Zoom automatique sur le lieu
    map.flyTo({
      center: lieu.coords,
      zoom: 13
    });

    panel.classList.add('open');

    title.innerText = lieu.name;

    // 🔥 Carousel / photos
    carousel.innerHTML="";
    window.currentIndex = 0;

    lieu.medias.forEach((media,index)=>{
      const img = document.createElement("img");
      img.src = media;
      if(index === 0) img.classList.add("active");

      img.addEventListener('click', ()=>{
        const items = carousel.children;
        items[currentIndex].classList.remove("active");
        currentIndex = (currentIndex + 1) % items.length;
        items[currentIndex].classList.add("active");
      });

      carousel.appendChild(img);
    });

    // 🔥 Texte sous image
    desc.innerHTML="";
    lieu.desc.forEach(item=>{
      const p=document.createElement("p");
      p.innerText=item.text;
      if(item.class) p.className=item.class;
      desc.appendChild(p);
    });

  });

  markers.push(marker);
});

// clic sur carte ferme le panel
map.on('click',()=>panel.classList.remove('open'));

// filtres
document.querySelectorAll('.filter-btn').forEach(button=>{
  button.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.remove('active'));
    button.classList.add('active');

    const category = button.innerText.toLowerCase();

    markers.forEach(marker=>{
      if(category.includes("plages") && marker.type==="plage") marker.getElement().style.display="block";
      else marker.getElement().style.display="none";
    });
  });
});

// ================= SWIPE MOBILE =================
let startX=0,endX=0;
document.addEventListener("touchstart",(e)=>{startX=e.touches[0].clientX;});
document.addEventListener("touchend",(e)=>{endX=e.changedTouches[0].clientX; handleSwipe();});

function handleSwipe(){
  if(!panel.classList.contains("open")) return;
  const diff = startX-endX;
  if(Math.abs(diff)<50) return;
  const items = carousel.children;
  if(!items.length) return;
  items[currentIndex].classList.remove("active");
  if(diff>0) currentIndex=(currentIndex+1)%items.length;
  else currentIndex=(currentIndex-1+items.length)%items.length;
  items[currentIndex].classList.add("active");
}
</script>

</body>
</html>
